openapi: 3.1.0
info:
  title: Dialpad Calls Offices API
  description: REST API for Dialpad's AI-powered cloud communications platform. Manage calls, users, offices, contacts, rooms, recordings, transcripts, webhooks and event subscriptions.
  version: '2.0'
servers:
- url: https://dialpad.com/api/v2
  description: Dialpad API v2
security:
- bearerAuth: []
- apiKeyAuth: []
tags:
- name: Offices
paths:
  /offices:
    get:
      tags:
      - Offices
      summary: List offices
      operationId: listOffices
      responses:
        '200':
          description: Offices
    post:
      tags:
      - Offices
      summary: Create secondary office
      operationId: createOffice
      responses:
        '200':
          description: Office created
  /offices/{id}:
    get:
      tags:
      - Offices
      summary: Get office
      operationId: getOffice
      parameters:
      - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: Office
    patch:
      tags:
      - Offices
      summary: Update office
      operationId: updateOffice
      parameters:
      - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: Office updated
components:
  parameters:
    Id:
      name: id
      in: path
      required: true
      schema:
        type: string
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
    apiKeyAuth:
      type: apiKey
      in: header
      name: Authorization
