openapi: 3.1.0
info:
  title: Dialpad Calls Recordings API
  description: REST API for Dialpad's AI-powered cloud communications platform. Manage calls, users, offices, contacts, rooms, recordings, transcripts, webhooks and event subscriptions.
  version: '2.0'
servers:
- url: https://dialpad.com/api/v2
  description: Dialpad API v2
security:
- bearerAuth: []
- apiKeyAuth: []
tags:
- name: Recordings
paths:
  /recording_share_link:
    post:
      tags:
      - Recordings
      summary: Create recording share link
      operationId: createRecordingShareLink
      responses:
        '200':
          description: Share link created
  /recording_share_link/{id}:
    get:
      tags:
      - Recordings
      summary: Get recording share link
      operationId: getRecordingShareLink
      parameters:
      - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: Share link
components:
  parameters:
    Id:
      name: id
      in: path
      required: true
      schema:
        type: string
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
    apiKeyAuth:
      type: apiKey
      in: header
      name: Authorization
