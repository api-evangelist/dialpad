openapi: 3.1.0
info:
  title: Dialpad Calls Rooms API
  description: REST API for Dialpad's AI-powered cloud communications platform. Manage calls, users, offices, contacts, rooms, recordings, transcripts, webhooks and event subscriptions.
  version: '2.0'
servers:
- url: https://dialpad.com/api/v2
  description: Dialpad API v2
security:
- bearerAuth: []
- apiKeyAuth: []
tags:
- name: Rooms
paths:
  /rooms:
    get:
      tags:
      - Rooms
      summary: List rooms
      operationId: listRooms
      responses:
        '200':
          description: Rooms
    post:
      tags:
      - Rooms
      summary: Create room
      operationId: createRoom
      responses:
        '200':
          description: Room created
  /rooms/{id}:
    get:
      tags:
      - Rooms
      summary: Get room
      operationId: getRoom
      parameters:
      - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: Room
    patch:
      tags:
      - Rooms
      summary: Update room
      operationId: updateRoom
      parameters:
      - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: Updated
components:
  parameters:
    Id:
      name: id
      in: path
      required: true
      schema:
        type: string
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
    apiKeyAuth:
      type: apiKey
      in: header
      name: Authorization
